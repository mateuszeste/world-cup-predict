spring.application.name=world-cup-predict
server.port=${PORT:8080}

# Domyslnie: baza H2 zapisywana do pliku (wystarczy lokalnie, bez zewnetrznych zaleznosci).
# W produkcji (np. Render + Supabase Postgres) nadpisz zmiennymi srodowiskowymi:
#   DB_URL=jdbc:postgresql://<host-poolera>:<port>/postgres?sslmode=require
#   DB_DRIVER=org.postgresql.Driver
#   DB_USERNAME=postgres.<project-ref>
#   DB_PASSWORD=<haslo-bazy>
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/worldcup;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# PgBouncer (Supabase pooler) nie obsluguje prepared statements.
spring.datasource.hikari.prepared-statement-cache-size=0
spring.datasource.hikari.prepared-statement-cache-limit=0
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Konsola H2 pod /h2-console - domyslnie WYLACZONA (bezpieczenstwo w produkcji).
# Lokalnie wlacz ustawiajac H2_CONSOLE_ENABLED=true.
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# --- Logowanie / JWT ---
# Sekret do podpisu tokenow (min. 32 znaki). W produkcji ustaw zmienna APP_JWT_SECRET.
app.jwt.secret=${APP_JWT_SECRET:zmien-ten-sekret-na-dlugi-losowy-ciag-0123456789abcdef}
app.jwt.expiration-hours=1000

# --- Admin ---
# Uzytkownik z uprawnieniami admina (konfigurowany przez env APP_ADMIN_USERNAME).
app.admin.username=${APP_ADMIN_USERNAME:admin}

# --- Sofascore (fallback dla TheSportsDB) ---
# Plan basic: 500 requestow/miesiac. Klucz z https://rapidapi.com/apidojo/api/sofascore
app.apifootball.key=${API_FOOTBALL_KEY:}
